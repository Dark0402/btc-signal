name: BTC Scalp Signal

on:
  schedule:
    - cron: '*/15 * * * *'   # 每 15 分鐘掃描一次
    - cron: '0 0 * * *'       # 台灣早上 8:00（UTC 00:00）跑日報
  workflow_dispatch:           # 允許手動觸發（測試用）

permissions:
  contents: write              # 允許 bot 把 state.json commit 回 repo

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run BTC signal scanner
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: |
          if [ "${{ github.event.schedule }}" = "0 0 * * *" ]; then
            echo "[INFO] Running daily digest..."
            python btc_scalp_signal.py --daily
          else
            echo "[INFO] Running 15-min scan..."
            python btc_scalp_signal.py
          fi

      - name: Commit updated state back to repo
        run: |
          git config user.name  "btc-signal-bot"
          git config user.email "btc-signal-bot@noreply.github.com"
          git add btc_scalp_state.json
          if git diff --staged --quiet; then
            echo "[INFO] State unchanged, nothing to commit."
          else
            git commit -m "state: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase
            git push
          fi
